<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Den ultimative Guizz</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="game-container">
        <div id="progress-container" class="hidden">
            <div class="header-status">
                <span id="category-indicator">Kategori: ---</span>
                <span id="score-counter">Score: 0 / 0</span>
            </div>
            <div id="progress-background">
                <div id="progress-bar"></div>
            </div>
        </div>

        <div id="welcome-screen" class="screen">
            <h1>Den ultimative Guizz</h1>
            <p>Er du klar til den ultimative, ultra seje og mega sjov Guiz</p>
            <img id="welcome-image" src="Guizz.jpg" alt="Scavenger Hunt Theme" class="game-img">
            
            <div class="team-selection">
                <p>Vælg dit team:</p>
                <div class="team-buttons">
                    <button class="btn team-btn" data-team="1">Cool Kids</button>
                    <button class="btn team-btn" data-team="2">Flaming Hot</button>
                    <button class="btn team-btn" data-team="3">Du bist gut genung</button>
                </div>
            </div>
        </div>

        <div id="quiz-screen" class="screen hidden">
            <h2 id="slide-title">Spørgsmål X</h2>
            <p id="question-text">Svar har...</p>
            <img id="question-image" src="" alt="Question Image" class="game-img hidden">
            
            <div id="audio-container" class="hidden">
                <p class="audio-hint">🎵 Lyt meget godt efter!:</p>
                <audio id="game-audio" controls>
                    <source id="audio-source" src="" type="audio/mpeg">
                </audio>
            </div>

            <div class="input-container">
                <input type="text" id="answer-input" placeholder="Skriv dit svar her..." autocomplete="off">
                <button id="submit-btn" class="btn">Er det dit endelige svar?</button>
                <button id="pass-btn" class="btn pass-btn-style">Skip</button>
            </div>
            <p id="feedback-message"></p>
        </div>

        <div id="break-screen" class="screen hidden">
            <h2>🛑 Kategorien er færdig! 🛑</h2>
            <p>Hendvend dig til Gustav, så sker der noget VILDT!</p>
            <div class="input-container">
                <input type="text" id="break-code-input" placeholder="Skriv koden her..." autocomplete="off">
                <button id="unlock-btn" class="btn">Næste kategori</button>
            </div>
            <p id="break-feedback" class="incorrect"></p>
        </div>

        <div id="victory-screen" class="screen hidden">
            <h2>🎉 Så er du done 🎉</h2>
            <p id="final-score-text">Godt klaret</p>
            <img src="https://tenor.com/rW1EfyZSoZh.gif" alt="Success" class="game-img">
            <button id="restart-btn" class="btn">Vil du spille igen</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
