<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Den Ultimative Fødselsdags Quiz</title>
    <link rel="stylesheet" href="style.css">
    <!-- Canvas Confetti Library for the celebration effect -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="game-container">
        <!-- Progress Bar (Hidden on start/end screens) -->
        <div id="progress-container" class="hidden">
            <div id="progress-bar"></div>
        </div>

        <!-- SCREEN 1: Front Page / Welcome -->
        <div id="welcome-screen" class="screen">
            <h1>Velkommen til denne mega ultra sjove quiz</h1>
            <p>Vær klar, parat og ikke mindst klar, til nogle sjove og svære spørgsmål</p>
            
            <!-- Replace 'welcome-banner.jpg' with your actual image file name or URL -->
            <img id="welcome-image" src="welcome-banner.jpg" alt="Scavenger Hunt Theme" class="game-img">
            
            <button id="start-btn" class="btn">Start Quizzen</button>
        </div>

        <!-- SCREEN 2: Question/Slide Engine -->
        <div id="quiz-screen" class="screen hidden">
            <h2 id="slide-title">Question X</h2>
            <p id="question-text">Riddle or prompt goes here...</p>
            
            <!-- Optional Audio Player Element -->
            <div id="audio-container" class="hidden">
                <p class="audio-hint">🎵 Listen closely to this clue:</p>
                <audio id="game-audio" controls>
                    <source id="audio-source" src="" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </div>

            <!-- Answer Submission Form -->
            <div class="input-container">
                <input type="text" id="answer-input" placeholder="Type your answer here..." autocomplete="off">
                <button id="submit-btn" class="btn">Submit Answer</button>
            </div>
            <p id="feedback-message"></p>
        </div>

        <!-- SCREEN 3: Victory Screen -->
        <div id="victory-screen" class="screen hidden">
            <h2>🎉 Congratulations! 🎉</h2>
            <p>You have successfully deciphered all the clues and completed the scavenger hunt!</p>
            <img src="https://media.giphy.com/media/26tOZ42Mg6pbTUPHW/giphy.gif" alt="Success" class="game-img">
            <button id="restart-btn" class="btn">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
