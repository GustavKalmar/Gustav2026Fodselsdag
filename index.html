<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ultimate Scavenger Hunt</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="game-container">
        <div id="progress-container" class="hidden">
            <div class="header-status">
                <span>Progress:</span>
                <span id="score-counter">Score: 0 / 0</span>
            </div>
            <div id="progress-background">
                <div id="progress-bar"></div>
            </div>
        </div>

        <div id="welcome-screen" class="screen">
            <h1>Welcome to the Scavenger Hunt!</h1>
            <p>Prepare your mind, listen closely, and solve the riddles to find the ultimate treasure.</p>
            <img id="welcome-image" src="Guizz.jpg" alt="Scavenger Hunt Theme" class="game-img">
            <button id="start-btn" class="btn">Start Adventure</button>
        </div>

        <div id="quiz-screen" class="screen hidden">
            <h2 id="slide-title">Question X</h2>
            <p id="question-text">Riddle or prompt goes here...</p>
            
            <div id="audio-container" class="hidden">
                <p class="audio-hint">🎵 Listen closely to this clue:</p>
                <audio id="game-audio" controls>
                    <source id="audio-source" src="" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </div>

            <div class="input-container">
                <input type="text" id="answer-input" placeholder="Type your answer here..." autocomplete="off">
                <button id="submit-btn" class="btn">Submit Answer</button>
            </div>
            <p id="feedback-message"></p>
        </div>

        <div id="victory-screen" class="screen hidden">
            <h2>🎉 Congratulations! 🎉</h2>
            <p id="final-score-text">You completed the hunt!</p>
            <img src="https://media.giphy.com/media/26tOZ42Mg6pbTUPHW/giphy.gif" alt="Success" class="game-img">
            <button id="restart-btn" class="btn">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
